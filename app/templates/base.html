<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}CVD Risk ML{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
  </head>

  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('main.index') }}">CVD Risk ML</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.index') }}">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.quick_test') }}">Quick test</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.history') }}">History</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.research') }}">Research results</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.about') }}">About</a></li>
          </ul>
          <a class="btn btn-outline-primary" href="{{ url_for('main.full_version') }}">Full version</a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      {% block content %}{% endblock %}
    </main>

    <footer class="border-top py-4">
      <div class="container small text-muted d-flex justify-content-between flex-wrap gap-2">
        <div>© 2026 CVD Risk ML (Diploma project)</div>
        <div class="text-end">Not medical advice. For educational/research use only.</div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
